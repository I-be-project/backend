# 운영용 오버라이드. 로컬 postgres(db) 제외, 앱 + Caddy(자동 HTTPS)만 기동.
# 단독 실행:    docker compose -f compose.prod.yml up -d --build
# 또는 병합:    docker compose -f docker-compose.yml -f compose.prod.yml up -d --build app caddy
services:
  app:
    build:
      context: .
    env_file:
      - .env
    restart: unless-stopped
    expose:
      - "8000"            # 외부 publish 안 함. Caddy만 내부망으로 접근
    # 로컬 db 의존성 제거 (운영 DB는 Supabase 직접 연결)

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data      # 발급된 인증서 영구 보관 (재시작 시 재발급 방지)
      - caddy-config:/config
    depends_on:
      - app

volumes:
  caddy-data:
  caddy-config:
